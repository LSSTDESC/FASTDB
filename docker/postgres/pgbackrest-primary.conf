[global]
# repo1 = remote/local object store (minio-site1)
repo1-type=s3
repo1-s3-bucket=fastdb-wal
repo1-s3-endpoint=minio-site1
repo1-s3-region=us-east-1
repo1-path=/repo1
repo1-s3-uri-style=path
repo1-storage-port=9000
repo1-storage-ca-file=/certs/ca.crt

# repo2 = remote object store (minio-site2)
repo2-type=s3
repo2-s3-bucket=fastdb-wal
repo2-s3-endpoint=minio-site2
repo2-s3-region=us-east-1
repo2-path=/repo2
repo2-s3-uri-style=path
repo2-storage-port=9010
repo2-storage-ca-file=/certs/ca.crt

repo1-retention-full=2
repo2-retention-full=2

compress-type=gz
log-level-console=info
log-level-file=detail
process-max=2

[fastdb]
pg1-path=/var/lib/postgresql/data/pgdata