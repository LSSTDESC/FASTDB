# FASTDB Helm Chart Values
# Base configuration - override with environment-specific values files

# Global settings
global:
  namespace: fastdb
  environment: dev

  # Image configuration
  imageRegistry: ""  # e.g., "ghcr.io/fifteen3", "registry.nersc.gov/m1727/raknop"
  imageTag: "latest"
  imagePullPolicy: Always
  imagePullSecrets: []
  # - name: ghcr-secret

  # Registry credentials (creates imagePullSecret automatically)
  # Pass via --set to avoid committing credentials:
  #   --set global.registryCredentials.server=ghcr.io
  #   --set global.registryCredentials.username=myuser
  #   --set global.registryCredentials.password=mytoken
  registryCredentials:
    enabled: false
    secretName: ghcr-secret
    server: ""
    username: ""
    password: ""

  # Namespace labels
  namespaceLabels: {}
  # owner: username
  # environment: dev

# Volume configuration
volumes:
  # Type: "pvc" for persistent volume claims
  type: pvc
  storageClass: ""

  # Enable hostPath for code directories (for local Kind deployment)
  # When true, mounts /fastdb-install and /fastdb-db from Kind extraMounts
  codeHostPath: false

  # Code PVC - for loading code via git clone (for vcluster/cloud deployments)
  codePvc:
    enabled: false
    size: 2Gi
    accessMode: ReadWriteMany
    gitRepo: "https://github.com/LSSTDESC/FASTDB.git"
    gitBranch: "main"

# Secrets
secrets:
  postgres:
    password: "changeme"
    roPassword: "changeme"
    replicatorPassword: "changeme"
  secretKey: "changeme"

  # MongoDB credentials
  mongodb:
    adminUser: "admin"
    adminPassword: "changeme"
    readerUser: "alertreader"
    readerPassword: "changeme"
    writerUser: "alertwriter"
    writerPassword: "changeme"

# PostgreSQL primary
postgres:
  enabled: true
  image:
    repository: fastdb-postgres
    tag: ""  # Falls back to global.imageTag
  replicas: 1

  persistence:
    size: 10Gi
    accessMode: ReadWriteOnce

  sharedMemory: 1Gi

  service:
    type: ClusterIP
    port: 5432

  # External access (NodePort or LoadBalancer)
  externalAccess:
    enabled: false
    type: NodePort  # or LoadBalancer
    nodePort: 30432
    # LoadBalancer annotations (for SLAC metallb)
    annotations: {}

  # Security context
  securityContext:
    runAsUser: null  # null for local, 100 for SLAC
    runAsNonRoot: false
    allowPrivilegeEscalation: false

  # pgBackRest WAL archiving
  pgbackrest:
    enabled: false
    stanza: fastdb
    # S3 repositories (up to 2)
    repo1:
      type: s3
      bucket: fastdb-wal
      endpoint: ""       # e.g., minio-site1, or real S3 endpoint
      region: us-east-1
      path: /repo1
      uriStyle: path
      storagePort: 9000
      verifyTls: true
      caFile: /certs/ca.crt
    repo2:
      enabled: true
      bucket: fastdb-wal
      endpoint: ""
      region: us-east-1
      path: /repo2
      uriStyle: path
      storagePort: 9000
      verifyTls: true
      caFile: /certs/ca.crt
    retention:
      full: 2
    archiveTimeout: 300

# PostgreSQL standby (read replica)
postgresStandby:
  enabled: false
  image:
    repository: fastdb-postgres-standby
    tag: ""
  replicas: 1

  waitForPrimary:
    enabled: true
    extraDelaySeconds: 30

  remoteRestore:
    enabled: false

  persistence:
    size: 10Gi
    accessMode: ReadWriteOnce

  sharedMemory: 1Gi

  primaryHost: postgres
  primaryPort: 5432
  replicationSlot: standby_slot

# MongoDB
mongodb:
  enabled: true
  image:
    repository: fastdb-mongodb
    tag: ""
  replicas: 1

  persistence:
    size: 5Gi
    accessMode: ReadWriteOnce

  config:
    host: mongodb
    database: brokeralert
    collection: alerts

# Web application
webap:
  enabled: true
  image:
    repository: fastdb-webap
    tag: ""
  replicas: 1

  service:
    type: ClusterIP
    port: 8080

  externalAccess:
    enabled: false
    type: NodePort
    nodePort: 30080

  # Base path for subdirectory deployments (sets SCRIPT_NAME env var)
  basePath: ""

  # Ingress configuration
  ingress:
    enabled: false
    host: ""
    path: "/"
    annotations: {}
    ingressClassName: ""
    tls: false
    tlsSecretName: ""

  # Volume mounts
  volumes:
    sessions:
      size: 1Gi
      accessMode: ReadWriteMany
    queryResults:
      size: 1Gi
      accessMode: ReadWriteMany
    logs:
      size: 1Gi
      accessMode: ReadWriteMany

# Shell pod for debugging
shell:
  enabled: true
  image:
    repository: fastdb-shell
    tag: ""
  replicas: 1

# Query runner
queryrunner:
  enabled: true
  image:
    repository: fastdb-query-runner
    tag: ""
  replicas: 1

# Mailhog (email testing)
mailhog:
  enabled: true
  image:
    repository: mailhog/mailhog
    tag: "latest"
    registry: "docker.io"
  replicas: 1

  externalAccess:
    enabled: false
    type: NodePort
    nodePort: 30025

# Database migrations job
createdb:
  enabled: true
  image:
    repository: fastdb-shell
    tag: ""
  ttlSecondsAfterFinished: 300

# MinIO for local pgBackRest testing
# Use site2 ports that match the pgbackrest-primary.conf
minio:
  enabled: false
  site1:
    port: 9000
    consolePort: 9001
    service:
      type: ClusterIP
  site2:
    port: 9000
    consolePort: 9001
    service:
      type: ClusterIP
  credentials:
    accessKey: minioadmin
    secretKey: minioadmin