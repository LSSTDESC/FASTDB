{{- if .Values.mailhog.enabled }}
{{- $namespace := include "fastdb.namespace" . }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: {{ $namespace }}
  labels:
    {{- include "fastdb.labels" . | nindent 4 }}
    app: mailhog
spec:
  replicas: {{ .Values.mailhog.replicas }}
  selector:
    matchLabels:
      app: mailhog
  template:
    metadata:
      labels:
        app: mailhog
    spec:
      containers:
      - name: mailhog
        image: {{ include "fastdb.externalImage" .Values.mailhog.image }}
        ports:
        - containerPort: 1025
          name: smtp
        - containerPort: 8025
          name: http
        readinessProbe:
          tcpSocket:
            port: 8025
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: {{ $namespace }}
  labels:
    {{- include "fastdb.labels" . | nindent 4 }}
    app: mailhog
spec:
  selector:
    app: mailhog
  ports:
  - name: smtp
    port: 1025
    targetPort: 1025
  - name: http
    port: 8025
    targetPort: 8025
  type: ClusterIP
{{- if .Values.mailhog.externalAccess.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog-external
  namespace: {{ $namespace }}
  labels:
    {{- include "fastdb.labels" . | nindent 4 }}
    app: mailhog
spec:
  selector:
    app: mailhog
  ports:
  - name: http
    port: 8025
    targetPort: 8025
    {{- if eq .Values.mailhog.externalAccess.type "NodePort" }}
    nodePort: {{ .Values.mailhog.externalAccess.nodePort }}
    {{- end }}
  type: {{ .Values.mailhog.externalAccess.type }}
{{- end }}
{{- end }}
