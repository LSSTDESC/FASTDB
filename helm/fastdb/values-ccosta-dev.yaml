# FASTDB ccosta-dev Environment Values
# Usage: helm install fastdb ./helm/fastdb -f ./helm/fastdb/values-ccosta-dev.yaml

global:
  namespace: ccosta-dev
  environment: dev

  # GitHub Container Registry
  imageRegistry: "ghcr.io/fifteen3"
  imageTag: "test20251201"
  imagePullPolicy: Always
  imagePullSecrets:
    - name: ghcr-secret

  # Registry credentials - pass password via --set:
  #   --set global.registryCredentials.password=ghp_xxxxx
  registryCredentials:
    enabled: true
    secretName: ghcr-secret
    server: ghcr.io
    username: fifteen3
    password: ""  # NEVER commit - pass via --set flag

# Use PVC for database storage
volumes:
  type: pvc  # PVCs for database storage
  storageClass: ""

  # hostPath is not allowed in vcluster - use code PVC instead
  codeHostPath: false

  # Code PVC - shared volume for application code (populated via kubectl cp)
  codePvc:
    enabled: true
    size: 2Gi
    accessMode: ReadWriteMany

# Local development secrets (not for production!)
secrets:
  postgres:
    password: "fragile"
    roPassword: "readonly1234"
    replicatorPassword: "repl1c4t0r"
  secretKey: "fragilesecretkey"

  mongodb:
    adminUser: "admin"
    adminPassword: "fragile"
    readerUser: "alertreader"
    readerPassword: "reader"
    writerUser: "alertwriter"
    writerPassword: "writer"

# PostgreSQL
postgres:
  enabled: true
  persistence:
    size: 10Gi

  # LoadBalancer for external access
  externalAccess:
    enabled: true
    type: LoadBalancer

# Standby enabled for local testing
postgresStandby:
  enabled: true
  persistence:
    size: 10Gi

# MongoDB
mongodb:
  enabled: true
  persistence:
    size: 5Gi

# Web application with Ingress
webap:
  enabled: true
  basePath: /fastdb-ccosta-dev
  externalAccess:
    enabled: false
  ingress:
    enabled: true
    host: desc-fastdb.slac.stanford.edu
    path: /fastdb-ccosta-dev
    annotations:
      nginx.ingress.kubernetes.io/proxy-body-size: "100m"

# Shell pod for debugging
shell:
  enabled: true

# Query runner
queryrunner:
  enabled: true

# Mailhog disabled
mailhog:
  enabled: false

# Database migrations
createdb:
  enabled: true
