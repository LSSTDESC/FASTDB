---
#
# Bucket creation job
# Retries until both MinIO instances are ready
#
apiVersion: batch/v1
kind: Job
metadata:
  name: create-buckets
  namespace: {{ include "fastdb.namespace" . }}
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-buckets
          image: minio/mc
          securityContext:
            capabilities:
              drop:
              - ALL
            privileged: false
            readOnlyRootFilesystem: false
          env:
          - name: HOME
            value: /tmp
          - name: MC_CONFIG_DIR
            value: /tmp/.mc
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for MinIO instances to be ready..."
              for i in $(seq 1 30); do
                mc alias set site1 http://minio-site1:{{ .Values.minio.site1.port }} \
                  {{ .Values.minio.credentials.accessKey }} \
                  {{ .Values.minio.credentials.secretKey }} --insecure 2>/dev/null && break
                echo "MinIO site1 not ready, retry $i/30..."
                sleep 5
              done



              mc mb --ignore-existing site1/{{ .Values.postgres.pgbackrest.repo1.bucket }} --insecure &&
              
              echo "Buckets created successfully"
{{- end }}