{{- if .Values.minio.enabled }}
#
# MinIO Site 1
#
apiVersion: apps/v1
kind: Deployment
metadata:
  name: minio-site1
  namespace: {{ .Values.global.namespace }}
  labels:
    app: minio-site1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: minio-site1
  template:
    metadata:
      labels:
        app: minio-site1
    spec:
      containers:
        - name: minio
          image: minio/minio
          command: ["minio", "server"]
          args: ["/data", "--console-address", ":9001", "--certs-dir", "/certs"]
          env:
            - name: MINIO_ROOT_USER
              value: {{ .Values.minio.credentials.accessKey | quote }}
            - name: MINIO_ROOT_PASSWORD
              value: {{ .Values.minio.credentials.secretKey | quote }}
          ports:
            - containerPort: 9000
              name: s3
            - containerPort: 9001
              name: console
          volumeMounts:
            - name: data
              mountPath: /data
            - name: certs
              mountPath: /certs
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 9000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: minio-site1-data
        - name: certs
          secret:
            secretName: minio-certs
            items:
              - key: public.crt
                path: public.crt
              - key: private.key
                path: private.key
              - key: ca.crt
                path: CAs/ca.crt

---
apiVersion: v1
kind: Service
metadata:
  name: minio-site1
  namespace: {{ .Values.global.namespace }}
spec:
  type: {{ .Values.minio.site1.service.type }}
  selector:
    app: minio-site1
  ports:
    - name: s3
      port: {{ .Values.minio.site1.port }}
      targetPort: 9000
      {{- if eq .Values.minio.site1.service.type "NodePort" }}
      nodePort: {{ .Values.minio.site1.service.nodePortS3 }}
      {{- end }}
    - name: console
      port: {{ .Values.minio.site2.consolePort }}
      targetPort: 9001
      {{- if eq .Values.minio.site1.service.type "NodePort" }}
      nodePort: {{ .Values.minio.site1.service.nodePortConsole }}
      {{- end }}

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: minio-site1-data
  namespace: {{ .Values.global.namespace }}
spec:
  accessModes: [ReadWriteOnce]
  {{- if .Values.volumes.storageClass }}
  storageClassName: {{ .Values.volumes.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: 5Gi

---
