---
#
# Bucket creation job
# Retries until both MinIO instances are ready
#
apiVersion: batch/v1
kind: Job
metadata:
  name: create-buckets
  namespace: {{ .Values.global.namespace }}
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: create-buckets
          image: minio/mc
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for MinIO instances to be ready..."
              for i in $(seq 1 30); do
                mc alias set site1 https://minio-site1:{{ .Values.minio.site1.port }} \
                  {{ .Values.minio.credentials.accessKey }} \
                  {{ .Values.minio.credentials.secretKey }} --insecure 2>/dev/null && break
                echo "MinIO site1 not ready, retry $i/30..."
                sleep 5
              done

              for i in $(seq 1 30); do
                mc alias set site2 https://minio-site2:{{ .Values.minio.site2.port }} \
                  {{ .Values.minio.credentials.accessKey }} \
                  {{ .Values.minio.credentials.secretKey }} --insecure 2>/dev/null && break
                echo "MinIO site2 not ready, retry $i/30..."
                sleep 5
              done

              mc mb --ignore-existing site1/{{ .Values.postgres.pgbackrest.repo1.bucket }} --insecure &&
              mc mb --ignore-existing site2/{{ .Values.postgres.pgbackrest.repo2.bucket }} --insecure &&
              echo "Buckets created successfully"
{{- end }}