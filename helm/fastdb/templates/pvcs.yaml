{{- if eq .Values.volumes.type "pvc" }}
{{- $namespace := include "fastdb.namespace" . }}

{{/* PostgreSQL PVC */}}
{{- if .Values.postgres.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ $namespace }}-postgres-pvc
  namespace: {{ $namespace }}
  labels:
    {{- include "fastdb.labels" . | nindent 4 }}
    app: postgres
spec:
  accessModes:
    - {{ .Values.postgres.persistence.accessMode }}
  {{- if .Values.volumes.storageClass }}
  storageClassName: {{ .Values.volumes.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
  volumeMode: Filesystem
{{- end }}

