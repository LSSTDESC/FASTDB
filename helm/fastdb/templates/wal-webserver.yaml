{{- if .Values.walWebserver.enabled }}
{{- $namespace := include "fastdb.namespace" . }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wal-nginx-config
  namespace: {{ $namespace }}
  labels:
    {{- include "fastdb.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;

        location {{ .Values.walWebserver.ingress.path }} {
            alias /usr/share/nginx/html;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }

        location / {
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wal-webserver
  namespace: {{ $namespace }}
  labels:
    {{- include "fastdb.labels" . | nindent 4 }}
    app: wal-webserver
spec:
  replicas: {{ .Values.walWebserver.replicas }}
  selector:
    matchLabels:
      app: wal-webserver
  template:
    metadata:
      labels:
        app: wal-webserver
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8080
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 101
        volumeMounts:
        - name: wal-archive
          mountPath: /usr/share/nginx/html
          readOnly: true
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
        - name: nginx-cache
          mountPath: /var/cache/nginx
        - name: nginx-run
          mountPath: /var/run
      volumes:
      - name: wal-archive
        persistentVolumeClaim:
          claimName: {{ $namespace }}-wal-archive-pvc
      - name: nginx-config
        configMap:
          name: wal-nginx-config
      - name: nginx-cache
        emptyDir: {}
      - name: nginx-run
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: wal-webserver
  namespace: {{ $namespace }}
  labels:
    {{- include "fastdb.labels" . | nindent 4 }}
    app: wal-webserver
spec:
  selector:
    app: wal-webserver
  ports:
  - name: http
    port: 80
    targetPort: 8080
  type: ClusterIP
{{- if .Values.walWebserver.ingress.enabled }}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wal-webserver
  namespace: {{ $namespace }}
  labels:
    {{- include "fastdb.labels" . | nindent 4 }}
  {{- with .Values.walWebserver.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  rules:
  - host: {{ .Values.walWebserver.ingress.host }}
    http:
      paths:
      - path: {{ .Values.walWebserver.ingress.path }}
        pathType: Prefix
        backend:
          service:
            name: wal-webserver
            port:
              number: 80
  {{- with .Values.walWebserver.ingress.tls }}
  tls:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
