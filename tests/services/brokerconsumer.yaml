brokers:
  - name: "test broker"
    class: BrokerConsumer
    server: kafka-server
    groupid: test-{barf}
    topics: [ "classifications-{barf}" ]
    updatetopics: false
    brokername_for_alerts: null
    brokername_key: brokerName
    mongodb_collection_base: fastdb_test
    loggername: TEST
    loggername_prefix: ""
    extraconfig: {}
    pollkwargs:
      restart_time_min: 0.1
      notopic_sleeptime: 1
      max_restarts: null
