# This is a docker compose environment to bring up a dev/test fastdb
# environment.

services:
  kafka-server:
    image: ${DOCKER_ARCHIVE:-ghcr.io/lsstdesc}/fastdb-kafka-test:${DOCKER_VERSION-test20260428}
    build:
      context: ./docker/kafka
    environment:
      # cf: https://github.com/apache/kafka/blob/trunk/docker/examples/docker-compose-files/single-node/plaintext/docker-compose.yml
      # Generate a new CLUSTER_ID with: uuid -v4 | tr -d '-' | base64 | cut -b 1-22
      CLUSTER_ID: MjAyZjRjNzk5OGI3NGMxNm
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-server:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-server:9093
      KAFKA_LISTENERS: CONTROLLER://:9093,PLAINTEXT://:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_SHARE_COORDINATOR_STATE_TOPIC_MIN_ISR: 1
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    healthcheck:
      test: nc -w 1 localhost 9092 || exit 1
      interval: 5s
      timeout: 10s
      retries: 10

  postgres:
    image: ${DOCKER_ARCHIVE:-ghcr.io/lsstdesc}/fastdb-postgres:${DOCKER_VERSION:-test20260428}
    build:
      context: ./docker/postgres
      target: postgres
      args:
        NERSCSPIN: ${NERSCSPIN:-0}
    volumes:
      - type: volume
        source: postgres_data
        target: /var/lib/postgresql/data
      - type: bind
        source: tests/secrets
        target: /secrets
        read_only: true
    healthcheck:
      test: netcat -w 1 localhost 5432 || exit 1
      interval: 5s
      timeout: 10s
      retries: 10

  mongodb:
    image: ${DOCKER_ARCHIVE:-ghcr.io/lsstdesc}/fastdb-mongodb:${DOCKER_VERSION:-test20260428}
    build:
      context: ./docker/mongodb
    environment:
      - MONGODB_HOST=mongodb
      - MONGODB_DBNAME=brokeralert
      - MONGODB_COLLECTION=alerts
      - MONGODB_ADMIN_USER=admin
      - MONGODB_ADMIN_PASSWD=fragile
      - MONGODB_ALERT_READER_USER=alertreader
      - MONGODB_ALERT_READER_PASSWD=reader
      - MONGODB_ALERT_WRITER_USER=alertwriter
      - MONGODB_ALERT_WRITER_PASSWD=writer
    volumes:
      - type: volume
        source: mongodb_data
        target: /data/db
    healthcheck:
      test: test `mongosh mongodb://$$MONGODB_ADMIN_USER:$$MONGODB_ADMIN_PASSWD@localhost/admin --eval "use admin" --eval "db.system.users.find({user:'$$MONGODB_ADMIN_USER'}).count()"` -eq 1 || exit 1
      interval: 5s
      timeout: 10s
      retries: 10

  createdb:
    depends_on:
      postgres:
        condition: service_healthy
    image: ${DOCKER_ARCHIVE:-ghcr.io/lsstdesc}/fastdb-shell:${DOCKER_VERSION:-test20260428}
    build:
      context: ./docker/webserver
      target: shell
    user: ${USERID:-0}:${GROUPID:-0}
    volumes:
      - type: bind
        source: .
        target: /code
    working_dir: /code/db
    entrypoint: [ "python", "apply_migrations.py" ]

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "${MAILHOG_PORT:-8025}:8025"

  queryrunner:
    depends_on:
      createdb:
        condition: service_completed_successfully
    image: ${DOCKER_ARCHIVE:-ghcr.io/lsstdesc}/fastdb-query-runner:${DOCKER_VERSION:-test20260428}
    build:
      context: ./docker/query_runner
      target: queryrunner
    user: ${USERID:-0}:${GROUPID:-0}
    volumes:
      - type: bind
        source: tests/secrets
        target: /secrets
        read_only: true
      - type: bind
        source: install
        target: /fastdb
      - type: volume
        source: query_results
        target: /query_results
    post_start:
      - command: /bin/bash -c "chown -R ${USERID:-0}:${GROUPID:-0} /query_results"
        privileged: true
        user: root

  webap:
    depends_on:
      mongodb:
        condition: service_healthy
      createdb:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
      queryrunner:
        condition: service_started
    image: ${DOCKER_ARCHIVE:-ghcr.io/lsstdesc}/fastdb-webap:${DOCKER_VERSION:-test20260428}
    build:
      context: ./docker/webserver
      target: webserver
    environment:
      - MONGODB_HOST=mongodb
      - MONGODB_DBNAME=brokeralert
      - MONGODB_COLLECTION=alerts
      - MONGODB_ADMIN_USER=admin
      - MONGODB_ADMIN_PASSWD=fragile
      - MONGODB_ALERT_READER_USER=alertreader
      - MONGODB_ALERT_READER_PASSWD=reader
      - MONGODB_ALERT_WRITER_USER=alertwriter
      - MONGODB_ALERT_WRITER_PASSWD=writer
    user: ${USERID:-0}:${GROUPID:-0}
    ports:
      - "${WEBPORT:-8080}:8080"
    volumes:
      - type: bind
        source: tests/secrets
        target: /secrets
        read_only: true
      - type: bind
        source: .
        target: /code
      - type: bind
        source: install
        target: /fastdb
      - type: volume
        source: sessions
        target: /sessions
      - type: volume
        source: query_results
        target: /query_results
      - type: volume
        source: logs
        target: /logs
    post_start:
      - command: /bin/bash -c "
                   chown -R ${USERID:-0}:${GROUPID:-0} /sessions
                   && chown -R ${USERID:-0}:${GROUPID:-0} /query_results
                   && chown -R ${USERID:-0}:${GROUPID:-0} /logs
                   "
        privileged: true
        user: root

  shell:
    depends_on:
      kafka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      createdb:
        condition: service_completed_successfully
    image: ${DOCKER_ARCHIVE:-ghcr.io/lsstdesc}/fastdb-shell:${DOCKER_VERSION:-test20260428}
    environment:
      - MONGODB_HOST=mongodb
      - MONGODB_DBNAME=brokeralert
      - MONGODB_COLLECTION=alerts
      - MONGODB_ADMIN_USER=admin
      - MONGODB_ADMIN_PASSWD=fragile
      - MONGODB_ALERT_READER_USER=alertreader
      - MONGODB_ALERT_READER_PASSWD=reader
      - MONGODB_ALERT_WRITER_USER=alertwriter
      - MONGODB_ALERT_WRITER_PASSWD=writer
    user: ${USERID:-0}:${GROUPID:-0}
    volumes:
      - type: bind
        source: tests/secrets
        target: /secrets
        read_only: true
      - type: bind
        source: .
        target: /code
      - type: bind
        source: install
        target: /fastdb
      - type: volume
        source: sessions
        target: /sessions
      - type: volume
        source: query_results
        target: /query_results
      - type: volume
        source: logs
        target: /logs
    post_start:
      - command: /bin/bash -c "
                   chown -R ${USERID:-0}:${GROUPID:-0} /sessions
                   && chown -R ${USERID:-0}:${GROUPID:-0} /query_results
                   && chown -R ${USERID:-0}:${GROUPID:-0} /logs
                   "
        privileged: true
        user: root
    working_dir: /code

  shell-nocreatedb:
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    image: ${DOCKER_ARCHIVE:-ghcr.io/lsstdesc}/fastdb-shell:${DOCKER_VERSION:-test20260428}
    environment:
      - MONGODB_HOST=mongodb
      - MONGODB_DBNAME=brokeralert
      - MONGODB_COLLECTION=alerts
      - MONGODB_ADMIN_USER=admin
      - MONGODB_ADMIN_PASSWD=fragile
      - MONGODB_ALERT_READER_USER=alertreader
      - MONGODB_ALERT_READER_PASSWD=reader
      - MONGODB_ALERT_WRITER_USER=alertwriter
      - MONGODB_ALERT_WRITER_PASSWD=writer
    user: ${USERID:-0}:${GROUPID:-0}
    volumes:
      - type: bind
        source: tests/secrets
        target: /secrets
        read_only: true
      - type: bind
        source: .
        target: /code
      - type: bind
        source: install
        target: /fastdb
      - type: volume
        source: sessions
        target: /sessions
      - type: volume
        source: query_results
        target: /query_results
      - type: volume
        source: logs
        target: /logs
    post_start:
      - command: /bin/bash -c "
                   chown -R ${USERID:-0}:${GROUPID:-0} /sessions
                   && chown -R ${USERID:-0}:${GROUPID:-0} /query_results
                   && chown -R ${USERID:-0}:${GROUPID:-0} /logs
                   "
        privileged: true
        user: root
    working_dir: /code

  makeinstall:
    image: ${DOCKER_ARCHIVE:-ghcr.io/lsstdesc}/fastdb-shell:${DOCKER_VERSION:-test20260428}
    user: ${USERID:-0}:${GROUPID:-0}
    volumes:
      - type: bind
        source: .
        target: /code
      - type: bind
        source: install
        target: /fastdb
    working_dir: /code
    entrypoint: /bin/bash -c "
                  touch aclocal.m4 configure
                  && find . -name Makefile.am -exec touch \\{\\} \\;
                  && find . -name Makefile.in -exec touch \\{\\} \\;
                  && ./configure \
                       --with-installdir=/fastdb \
                       --with-smtp-server=mailhog \
                       --with-smtp-port=1025 \
                  && make install
                  "

  runtests:
    depends_on:
      kafka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      createdb:
        condition: service_completed_successfully
      webap:
        condition: service_started   # TODO : health test for webap
      makeinstall:
        condition: service_completed_successfully
    image: ${DOCKER_ARCHIVE:-ghcr.io/lsstdesc}/fastdb-shell:${DOCKER_VERSION:-test20260428}
    environment:
      - MONGODB_HOST=mongodb
      - MONGODB_DBNAME=brokeralert
      - MONGODB_COLLECTION=alerts
      - MONGODB_ADMIN_USER=admin
      - MONGODB_ADMIN_PASSWD=fragile
      - MONGODB_ALERT_READER_USER=alertreader
      - MONGODB_ALERT_READER_PASSWD=reader
      - MONGODB_ALERT_WRITER_USER=alertwriter
      - MONGODB_ALERT_WRITER_PASSWD=writer
    user: ${USERID:-0}:${GROUPID:-0}
    volumes:
      - type: bind
        source: tests/secrets
        target: /secrets
        read_only: true
      - type: bind
        source: .
        target: /code
      - type: bind
        source: install
        target: /fastdb
      - type: volume
        source: logs
        target: /logs
    post_start:
      - command: /bin/bash -c "
                   chown -R ${USERID:-0}:${GROUPID:-0} /sessions
                   && chown -R ${USERID:-0}:${GROUPID:-0} /query_results
                   && chown -R ${USERID:-0}:${GROUPID:-0} /logs
                   "
        privileged: true
        user: root
    working_dir: /code/tests
    entrypoint: pytest -v
    
volumes:
  postgres_data:
  mongodb_data:
  query_results:
  sessions:
  logs:
